<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire Game Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: radial-gradient(circle, #0f172a, #020617);
  color: white;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(0,255,255,0.3);
}

.glow {
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff, 0 0 25px #00ffff;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #00ffff, #3b82f6);
  color: black;
  font-weight: bold;
  margin-top: 10px;
  box-shadow: 0 0 15px #00ffff;
}

button:active {
  transform: scale(0.95);
}

</style>
</head>

<body>

<h1 class="glow">🚀 Empire Tycoon Web</h1>

<div class="card">
  <h3>💰 Cash</h3>
  <h1 id="cash" class="glow">$0</h1>

  <p>⚡ Income: <span id="income">0</span>/sec</p>

  <button onclick="upgrade()">🚀 Upgrade Income</button>
</div>

<div class="card">
  <h3>🏆 Level: <span id="level">1</span></h3>
  <p>Achievement: <span id="achievement">Beginner</span></p>
</div>

<div class="card">
  <h3>📊 Net Worth</h3>
  <canvas id="lineChart"></canvas>
</div>

<div class="card">
  <h3>🥧 Assets</h3>
  <canvas id="pieChart"></canvas>
</div>

<script>

// DATA
let cash = 1000;
let income = 50;
let level = 1;

// LOAD SAVE
if(localStorage.getItem("game")){
  let save = JSON.parse(localStorage.getItem("game"));
  cash = save.cash;
  income = save.income;
  level = save.level;
}

// UPDATE UI
function updateUI(){
  document.getElementById("cash").innerText = "$" + Math.floor(cash);
  document.getElementById("income").innerText = income;
  document.getElementById("level").innerText = level;

  // achievement
  let ach = "Beginner";
  if(cash > 10000) ach = "Pro Player";
  if(cash > 1000000) ach = "Tycoon";
  if(cash > 100000000) ach = "Legend 🔥";
  document.getElementById("achievement").innerText = ach;
}

// AUTO MONEY
setInterval(()=>{
  cash += income;
  updateUI();
  saveGame();
},1000);

// UPGRADE
function upgrade(){
  if(cash >= 500){
    cash -= 500;
    income += 20;
    level++;
  }
}

// SAVE
function saveGame(){
  localStorage.setItem("game", JSON.stringify({cash, income, level}));
}

// LINE CHART
const ctx1 = document.getElementById('lineChart');
let dataPoints = [cash];

const chart = new Chart(ctx1, {
  type: 'line',
  data: {
    labels: ['1'],
    datasets: [{
      label: 'Net Worth',
      data: dataPoints,
      borderColor: '#00ffff'
    }]
  }
});

setInterval(()=>{
  dataPoints.push(cash);
  chart.data.labels.push('');
  chart.update();
},2000);

// PIE CHART
new Chart(document.getElementById('pieChart'), {
  type: 'pie',
  data: {
    labels: ['Cash','Business','Investasi','Properti'],
    datasets: [{
      data: [40,30,20,10],
      backgroundColor: ['#00ffff','#22c55e','#f59e0b','#ef4444']
    }]
  }
});

updateUI();

</script>

</body>
</html>
